<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shruti 🦋 | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            /* NEW PREMIUM GOLD/DARK THEME BACKGROUND */
            background: #0f0f12; 
            background: linear-gradient(135deg, #1f1d2b 0%, #111116 100%); 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            position: relative;
        }

        /* --- STYLISH BACKGROUND ANIMATION (Floating particles) --- */
        .bg-bubbles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }
        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 20px; height: 20px;
            /* White with very low opacity */
            background-color: rgba(255, 255, 255, 0.03);
            bottom: -160px;
            border-radius: 50%;
            /* Goldish glow for premium look */
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            animation: floatUp 25s infinite linear;
        }
        
        /* Bubble variations */
        .bg-bubbles li:nth-child(1) { left: 10%; width: 30px; height: 30px; animation-duration: 20s;}
        .bg-bubbles li:nth-child(2) { left: 20%; width: 50px; height: 50px; animation-delay: 2s; animation-duration: 17s; }
        .bg-bubbles li:nth-child(3) { left: 25%; animation-delay: 4s; }
        .bg-bubbles li:nth-child(4) { left: 40%; width: 40px; height: 40px; animation-duration: 22s; background-color: rgba(212, 175, 55, 0.03); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);}
        .bg-bubbles li:nth-child(5) { left: 70%; }
        .bg-bubbles li:nth-child(6) { left: 80%; width: 80px; height: 80px; animation-delay: 3s; background-color: rgba(212, 175, 55, 0.03); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);}
        .bg-bubbles li:nth-child(7) { left: 32%; width: 100px; height: 100px; animation-delay: 7s; }
        .bg-bubbles li:nth-child(8) { left: 55%; width: 20px; height: 20px; animation-delay: 15s; animation-duration: 40s; }
        .bg-bubbles li:nth-child(9) { left: 25%; width: 10px; height: 10px; animation-delay: 2s; animation-duration: 40s; background-color: rgba(255, 255, 255, 0.05);}
        .bg-bubbles li:nth-child(10) { left: 90%; width: 90px; height: 90px; animation-delay: 11s; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 50%; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 30%; }
        }

        /* --- CARD DESIGN --- */
        .card { 
            width: 90%; max-width: 380px; 
            /* Darker glassmorphism */
            background: rgba(10, 10, 10, 0.7); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 25px; 
            text-align: center; 
            /* Subtle Gold border */
            border: 1px solid rgba(212, 175, 55, 0.2); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); 
            z-index: 1; 
        }
        
        /* Profile Pic with Gold Border/Glow */
        .profile-pic { 
            width: 140px; height: 140px; 
            border-radius: 50%; 
            border: 3px solid #d4af37; /* Premium Gold */
            margin-bottom: 20px; 
            transition: 0.5s; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); 
            object-fit: cover;
        }
        .profile-pic:hover { transform: scale(1.05) rotate(5deg); box-shadow: 0 0 35px rgba(212, 175, 55, 0.6); border-color: #f5d565;}
        
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #f5d565; /* Lighter Gold text */}
        p { font-size: 14px; color: #bbb; margin-bottom: 30px; letter-spacing: 1px;}
        
        /* Button list layout (one below another) */
        .btn-list { display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            padding: 16px; border-radius: 50px; /* Round buttons */
            text-decoration: none; color: white; 
            /* Dark button background */
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            font-size: 15px; font-weight: 400;
            transition: 0.3s all ease-in-out; 
        }
        
        /* Gold Hover effect for buttons */
        .btn:hover { 
            transform: translateY(-3px); 
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37; 
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
            color: #f5d565;
        }

        /* Visual indicator for music */
        .music-notif {
            margin-top: 25px;
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .music-notif i { color: #d4af37; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

    </style>
</head>
<body>

    <!-- Animated Background Bubbles -->
    <ul class="bg-bubbles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <!-- Main Card -->
    <div class="card">
        <!-- New Profile Picture -->
        <img src="https://files.catbox.moe/40qwsd.jpg" class="profile-pic" alt="Profile">
        
        <!-- New Stylized Name -->
        <h1>වි𖣃̵៵᎑𖾓ᛧ ࣺ</h1>
        <p>Telegram ID & Bot Hub</p>
        
        <div class="btn-list">
            <!-- Telegram ID Button -->
            <a href="https://t.me/Shruti_queeen" target="_blank" class="btn">
                <i class="fa-brands fa-telegram"></i> Telegram ID
            </a>
            
            <!-- Channel Button -->
            <a href="https://t.me/Shurti_bots" target="_blank" class="btn">
                <i class="fa-solid fa-robot"></i> Bot Channel
            </a>
        </div>
        
        <!-- Music status indicator -->
        <div class="music-notif">
            <i class="fa-solid fa-music"></i> Background music playing...
        </div>
        
        <!-- New Music Source without showing the player -->
        <audio id="bg-music" autoplay loop>
            <source src="https://files.catbox.moe/pee8cu.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- Script to enforce autoplay -->
    <script>
        window.onload = function() {
            let music = document.getElementById("bg-music");
            
            // Set volume a bit lower for better user experience
            music.volume = 0.6;

            // Try to play immediately on load
            let playPromise = music.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    // Agar browser autoplay block kare (jo aksar hota hai), toh pehle interaction par music on hoga
                    console.log("Autoplay blocked. waiting for user interaction.");
                    
                    const startMusic = function() {
                        music.play();
                        // Remove listeners after first successful play
                        document.body.removeEventListener('click', startMusic);
                        document.body.removeEventListener('touchstart', startMusic);
                    };

                    document.body.addEventListener('click', startMusic);
                    document.body.addEventListener('touchstart', startMusic);
                });
            }
        };
    </script>
</body>
</html>
