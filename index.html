<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shruti 🦋 | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            position: relative;
            /* Soft Pastel Background Gradient */
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        /* =========================================
           --- CUTE PASTEL MESH BACKGROUND ---
           ========================================= */
        .cute-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        /* Moving Pastel Blobs */
        .mesh-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: meshMove 20s infinite alternate ease-in-out;
            will-change: transform;
        }

        /* Blob 1: Soft Pink */
        .blob1 {
            top: -10%; left: -10%;
            width: 600px; height: 600px;
            background: #ffb1cb;
            animation-duration: 25s;
        }

        /* Blob 2: Soft Lavender/Blue */
        .blob2 {
            bottom: -20%; right: -10%;
            width: 500px; height: 500px;
            background: #b5c6ff;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        /* Blob 3: Peach/White */
        .blob3 {
            top: 40%; left: 50%;
            width: 400px; height: 400px;
            background: #ffe6fa;
            opacity: 0.8;
            animation-duration: 15s;
            animation-delay: -2s;
        }

        /* =========================================
           --- FLOATING HEARTS & SPARKLES ---
           ========================================= */
        .floating-items {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .item {
            position: absolute;
            font-size: 24px;
            opacity: 0;
            animation: floatUpItem 12s infinite linear;
        }

        .item:nth-child(1) { left: 10%; animation-delay: 0s; font-size: 20px; }
        .item:nth-child(2) { left: 25%; animation-delay: 4s; font-size: 30px; }
        .item:nth-child(3) { left: 50%; animation-delay: 2s; font-size: 25px; }
        .item:nth-child(4) { left: 75%; animation-delay: 6s; font-size: 22px; }
        .item:nth-child(5) { left: 90%; animation-delay: 1s; font-size: 28px; }
        .item:nth-child(6) { left: 40%; animation-delay: 8s; font-size: 18px; }

        @keyframes floatUpItem {
            0% { top: 110%; opacity: 0; transform: translateX(0) rotate(0deg); }
            20% { opacity: 0.8; }
            50% { transform: translateX(20px) rotate(20deg); }
            80% { opacity: 0.8; }
            100% { top: -10%; opacity: 0; transform: translateX(-20px) rotate(-20deg); }
        }

        @keyframes meshMove {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(1); }
        }

        /* =========================================
           --- CARD DESIGN (Frosted White Glass) ---
           ========================================= */
        .card { 
            width: 90%; max-width: 380px; 
            /* White transparent glassmorphism */
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 35px; 
            text-align: center; 
            border: 2px solid rgba(255, 255, 255, 0.7); 
            /* Soft pink drop shadow */
            box-shadow: 0 20px 40px rgba(233, 150, 164, 0.3); 
            z-index: 1; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(233, 150, 164, 0.4); 
        }

        /* Profile Pic with Pink Border/Glow */
        .profile-pic { 
            width: 130px; height: 130px; 
            border-radius: 50%; 
            border: 4px solid #fff; 
            margin-bottom: 15px; 
            transition: 0.4s ease-in-out; 
            box-shadow: 0 10px 20px rgba(255, 105, 180, 0.3); 
            object-fit: cover;
        }
        .profile-pic:hover { 
            transform: scale(1.08) rotate(-5deg); 
            border-color: #ff9a9e;
            box-shadow: 0 15px 30px rgba(255, 105, 180, 0.5); 
        }
        
        /* Typography adjustments for light background */
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 5px; color: #d81b60; /* Deep cute pink */ }
        p { font-size: 15px; color: #880e4f; font-weight: 600; margin-bottom: 25px; letter-spacing: 0.5px; opacity: 0.8;}
        
        /* Button list layout */
        .btn-list { display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            padding: 16px; border-radius: 50px; 
            text-decoration: none; 
            /* White/Pink gradient text and background */
            color: #d81b60; 
            background: rgba(255, 255, 255, 0.8); 
            border: 2px solid #fff; 
            font-size: 16px; font-weight: 600;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 5px 15px rgba(255, 154, 158, 0.2);
        }
        
        /* Cute Hover effect for buttons */
        .btn:hover { 
            transform: translateY(-5px) scale(1.02); 
            background: linear-gradient(120deg, #fbc2eb 0%, #a6c1ee 100%);
            border-color: transparent; 
            box-shadow: 0 8px 20px rgba(251, 194, 235, 0.6);
            color: #fff;
        }

        /* Visual indicator for music */
        .music-notif {
            margin-top: 25px;
            font-size: 13px;
            color: #d81b60;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            opacity: 0.8;
        }
        .music-notif i { color: #ff4081; animation: heartbeat 1.5s infinite; }

        @keyframes heartbeat {
            0% { transform: scale(1); opacity: 0.8; }
            20% { transform: scale(1.2); opacity: 1; }
            40% { transform: scale(1); opacity: 0.8; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

    </style>
</head>
<body>

    <!-- =========================================
         --- CUTE PASTEL BACKGROUND ELEMENTS ---
         ========================================= -->
    <div class="cute-bg">
        <div class="mesh-blob blob1"></div>
        <div class="mesh-blob blob2"></div>
        <div class="mesh-blob blob3"></div>
    </div>

    <!-- Floating Emojis -->
    <div class="floating-items">
        <div class="item">✨</div>
        <div class="item">💖</div>
        <div class="item">🌸</div>
        <div class="item">✨</div>
        <div class="item">🦋</div>
        <div class="item">🤍</div>
    </div>

    <!-- Main Card -->
    <div class="card">
        <img src="https://files.catbox.moe/40qwsd.jpg" class="profile-pic" alt="Shruti">
        
        <h1>වි𖣃̵៵᎑𖾓ᛧ ࣺ</h1>
        <p>Telegram ID & Bot Hub ✨</p>
        
        <div class="btn-list">
            <a href="https://t.me/Shruti_queeen" target="_blank" class="btn">
                <i class="fa-brands fa-telegram"></i> Telegram ID
            </a>
            
            <a href="https://t.me/Shurti_bots" target="_blank" class="btn">
                <i class="fa-solid fa-robot"></i> Bot Channel
            </a>
        </div>
        
        <div class="music-notif">
            <i class="fa-solid fa-music"></i> Playing soft music...
        </div>
        
        <audio id="bg-music" autoplay loop>
            <source src="https://files.catbox.moe/pee8cu.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        window.onload = function() {
            let music = document.getElementById("bg-music");
            music.volume = 0.5; // Thoda soft volume rakha hai

            let playPromise = music.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    const startMusic = function() {
                        music.play();
                        document.body.removeEventListener('click', startMusic);
                        document.body.removeEventListener('touchstart', startMusic);
                    };
                    document.body.addEventListener('click', startMusic);
                    document.body.addEventListener('touchstart', startMusic);
                });
            }
        };
    </script>
</body>
</html>
