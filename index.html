<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shruti 🦋 | Cute Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === CUTE & PREMIUM SETUP === */
        :root {
            --cute-pink: #ff6699; 
            --deep-pink: #d81b60;
            --text-dark: #6a1b41;
            --bg-gradient: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            --glass: rgba(255, 255, 255, 0.45); 
            --shadow: 0 10px 30px rgba(255, 105, 180, 0.3); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; cursor: none; }
        body { background: var(--bg-gradient); color: var(--text-dark); overflow: hidden; height: 100vh; position: relative; }
        a { text-decoration: none; color: inherit; }
        button { border: none; background: transparent; cursor: pointer; }

        /* === 🛠️ FONT FIX FOR STYLISH SYMBOLS 🛠️ === */
        .stylish-text {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
            letter-spacing: normal !important; 
            text-transform: none !important; 
            font-weight: 400 !important; 
            line-height: 1.5;
        }

        /* === PRELOADER / INTRO === */
        #intro { position: fixed; inset: 0; background: var(--bg-gradient); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-out; }
        #intro.fade-out { opacity: 0; pointer-events: none; }
        
        .intro-text { 
            font-size: 3rem; 
            color: #fff; 
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9), 0 0 30px rgba(255, 105, 180, 0.6); 
            animation: soft-pulse 2s infinite alternate; 
            margin-bottom: 30px; 
            text-align: center;
        }
        
        .click-me-btn { padding: 15px 40px; border: 2px solid #fff; border-radius: 50px; color: #fff; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); font-size: 1.2rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; box-shadow: 0 0 15px rgba(255,255,255,0.5); position: relative; overflow: hidden; transition: 0.4s; }
        .click-me-btn:hover { background: #fff; color: var(--cute-pink); box-shadow: 0 0 25px #fff; transform: scale(1.05); }

        @keyframes soft-pulse {
            from { transform: scale(1); text-shadow: 0 0 15px rgba(255, 255, 255, 0.7); }
            to { transform: scale(1.05); text-shadow: 0 0 30px rgba(255, 255, 255, 1), 0 0 20px rgba(255, 105, 180, 0.5); }
        }

        /* === BACKGROUND EFFECTS === */
        #bg-canvas { position: fixed; inset: 0; z-index: -2; opacity: 0.7; }
        .v-lines { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .v-lines span { position: absolute; top: -10%; width: 2px; height: 15px; border-radius: 5px; background: rgba(255, 255, 255, 0.8); box-shadow: 0 0 10px #fff; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(20deg); opacity: 0;} }

        /* === MAIN CONTENT === */
        #main-content { display: none; padding: 20px; opacity: 0; transition: opacity 1s ease-in; position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; overflow-y: auto; align-items: center; scrollbar-width: none; }
        #main-content::-webkit-scrollbar { display: none; }

        /* === HEADER === */
        header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 20px 0; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.6rem; font-weight: 800; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }
        
        .nav-btn { color: var(--deep-pink); background: rgba(255,255,255,0.6); text-transform: uppercase; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; padding: 8px 20px; border-radius: 30px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,105,180,0.2); border: 2px solid #fff; }
        .nav-btn:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255,105,180,0.4); }

        /* === PROFILE CARD === */
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 2px solid rgba(255,255,255,0.7); border-radius: 40px; padding: 50px; width: 100%; max-width: 550px; text-align: center; margin: 30px 0; position: relative; box-shadow: var(--shadow); transform: translateY(20px); transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glass-card:hover { transform: translateY(0) scale(1.02); box-shadow: 0 20px 50px rgba(255, 105, 180, 0.4); }

        .profile-img-container { position: relative; width: 150px; height: 150px; margin: 0 auto 25px; }
        .profile-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 0 20px rgba(255,105,180,0.5); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .profile-img-container:hover .profile-img { transform: rotate(-5deg) scale(1.1); box-shadow: 0 0 30px rgba(255,105,180,0.8); }
        
        .profile-img-container::after { content: ''; position: absolute; inset: -12px; border: 2px dashed #fff; border-radius: 50%; animation: rotate-dashed 15s linear infinite; }
        @keyframes rotate-dashed { to { transform: rotate(360deg); } }

        /* === TEXT & ANIMATIONS === */
        h1 { font-size: 2.2rem; margin-bottom: 5px; color: var(--deep-pink); }
        
        .role-wrapper { font-size: 1.1rem; font-weight: 600; color: #880e4f; height: 30px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 8px; opacity: 0.9;}
        #typing-role { color: var(--cute-pink); font-weight: 800; text-shadow: 0 0 5px rgba(255,255,255,0.8); font-family: 'Poppins', sans-serif;}
        .cursor { display: inline-block; width: 2px; background-color: var(--deep-pink); animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .about-text { font-size: 0.95rem; line-height: 1.8; color: var(--text-dark); margin-bottom: 35px; text-align: center; padding: 0 10px; font-weight: 600; opacity: 0.85; }

        /* === SOCIAL BUTTONS === */
        .social-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255,255,255,0.7); border: 2px solid #fff; padding: 12px 25px; border-radius: 30px; color: var(--deep-pink); font-size: 1rem; font-weight: 600; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 5px 15px rgba(255,105,180,0.15); }
        .social-btn i { font-size: 1.3rem; }
        
        .social-btn:hover { transform: translateY(-5px) scale(1.05); background: #fff; box-shadow: 0 10px 25px rgba(255,105,180,0.3); color: var(--cute-pink); }

        /* === SOUND BUTTON === */
        .ctl-buttons { display: flex; justify-content: center; margin-top: 10px; }
        .sound-btn { background: var(--cute-pink); color: #fff; font-size: 0.9rem; font-weight: 600; border: 2px solid #fff; padding: 12px 30px; border-radius: 40px; transition: 0.3s; display: flex; align-items: center; gap: 8px; box-shadow: 0 5px 15px rgba(255,105,180,0.4); animation: cute-bounce 2s infinite; }
        .sound-btn:hover { background: #fff; color: var(--cute-pink); animation: none; transform: scale(1.05); }
        
        @keyframes cute-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* === FOOTER === */
        footer { width: 100%; max-width: 1200px; text-align: center; padding: 30px 0; color: #fff; font-size: 0.85rem; font-weight: 600; margin-top: auto; }
        .foot-username { color: rgba(255,255,255,0.8); margin-top: 5px; letter-spacing: 1px;}

        /* === MOBILE RESPONSIVE === */
        @media (max-width: 768px) {
            .logo { font-size: 1.3rem; }
            .intro-text { font-size: 2.5rem; }
            .glass-card { padding: 30px 20px; width: 95%; }
            .profile-img-container { width: 130px; height: 130px; }
            h1 { font-size: 1.8rem; }
            .role-wrapper { font-size: 0.95rem; }
            .about-text { font-size: 0.85rem; }
            .social-btn { padding: 10px 15px; font-size: 0.9rem; }
        }

        /* === CUSTOM CUTE CURSOR === */
        #cursor-dot { width: 10px; height: 10px; background-color: var(--cute-pink); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease; box-shadow: 0 0 10px var(--cute-pink); }
        #cursor-outline { width: 40px; height: 40px; border: 2px solid rgba(255, 102, 153, 0.5); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: transform 0.15s ease-out; }
        body:active #cursor-dot { width: 15px; height: 15px; background-color: #fff; }
        body:active #cursor-outline { width: 30px; height: 30px; background-color: rgba(255, 102, 153, 0.2); border-color: transparent;}
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <div id="intro">
        <div class="intro-text stylish-text">𝁤⃬𝆬විh៵᎑𖾓ᛧ ࣺ𓂃</div>
        
        <button class="click-me-btn" onclick="startPortfolio()">
            Enter <span class="stylish-text" style="font-size: 1.3rem;">𝁤⃬𝆬විh៵᎑𖾓ᛧ ࣺ𓂃</span> 🌸
        </button>
    </div>

    <canvas id="bg-canvas"></canvas>
    <div class="v-lines" id="v-lines"></div>

    <div id="main-content">
        <header>
            <div class="logo">Shruti ✨</div>
            <div class="nav-links">
                <a href="https://t.me/Shurti_bots" target="_blank" class="nav-btn">Bot Channel 🌸</a>
            </div>
        </header>

        <section class="glass-card">
            <div class="profile-img-container">
                <img src="https://files.catbox.moe/40qwsd.jpg" alt="Shruti" class="profile-img">
            </div>
            
            <h1 class="stylish-text">𝁤⃬𝆬විh៵᎑𖾓ᛧ ࣺ𓂃</h1>
            
            <div class="role-wrapper">
                I am a <span id="typing-role"></span><span class="cursor">|</span>
            </div>

            <p class="about-text">
                Welcome to my aesthetic space! 🌸 I love creating, deploying, and managing awesome bots. Step in to explore my digital world filled with cuteness, music, and perfect vibes. ✨
            </p>
            
            <div class="social-container">
                <a href="https://t.me/Shruti_queeen" target="_blank" class="social-btn">
                    <i class="fa-brands fa-telegram"></i> ID
                </a>
                <a href="https://t.me/Shurti_bots" target="_blank" class="social-btn">
                    <i class="fa-solid fa-robot"></i> Bots
                </a>
            </div>
            
            <div class="ctl-buttons">
                <button id="sound-btn" class="sound-btn" onclick="toggleMusic()">
                    <i id="sound-icon" class="fas fa-music"></i>
                    <span id="sound-text">Play Music 🎶</span>
                </button>
            </div>
        </section>

        <footer>
            <p>© 2026 Shruti ✨ All Rights Reserved.</p>
            <p class="foot-username">@Shruti_queeen</p>
        </footer>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="https://files.catbox.moe/giosa4.m4a" type="audio/mp4">
    </audio>

    <script>
        const roles = [
            "Bot Developer ✨",
            "Music Lover 🎶",
            "Aesthetic Girl 🦋",
            "Telegram Creator 🌸"
        ];
        const typingSpeed = 100; 
        const erasingSpeed = 50; 
        const newTextDelay = 2000; 
        
        const intro = document.getElementById('intro');
        const mainContent = document.getElementById('main-content');
        const bgMusic = document.getElementById('bg-music');
        const soundBtnText = document.getElementById('sound-text');
        const soundBtnIcon = document.getElementById('sound-icon');
        const typingRole = document.getElementById('typing-role');
        const vLinesContainer = document.getElementById('v-lines');
        const cursorDot = document.getElementById('cursor-dot');
        const cursorOutline = document.getElementById('cursor-outline');
        
        let roleIndex = 0;
        let charIndex = 0;
        let isMusicPlaying = false;

        window.addEventListener('load', () => {
            createVerticalLines(25);
            initParticleBackground();
            initCustomCursor();
        });

        function startPortfolio() {
            intro.classList.add('fade-out');
            setTimeout(() => {
                intro.style.display = 'none';
                mainContent.style.display = 'flex';
                requestAnimationFrame(() => mainContent.style.opacity = '1');
                
                playMusic();
                setTimeout(typeRole, newTextDelay / 2);
            }, 800);
        }

        function playMusic() {
            bgMusic.volume = 0.6;
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                updateSoundButton();
            }).catch(error => {
                console.log("Autoplay blocked:", error);
                isMusicPlaying = false;
                updateSoundButton();
            });
        }

        function toggleMusic() {
            if (isMusicPlaying) {
                bgMusic.pause();
                isMusicPlaying = false;
            } else {
                bgMusic.play();
                isMusicPlaying = true;
            }
            updateSoundButton();
        }

        function updateSoundButton() {
            if (isMusicPlaying) {
                soundBtnIcon.className = "fas fa-pause";
                soundBtnText.innerText = "Pause Music 🤫";
            } else {
                soundBtnIcon.className = "fas fa-music";
                soundBtnText.innerText = "Play Music 🎶";
            }
        }

        function typeRole() {
            if (charIndex < roles[roleIndex].length) {
                typingRole.textContent += roles[roleIndex].charAt(charIndex);
                charIndex++;
                setTimeout(typeRole, typingSpeed);
            } else {
                setTimeout(eraseRole, newTextDelay);
            }
        }

        function eraseRole() {
            if (charIndex > 0) {
                typingRole.textContent = roles[roleIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(eraseRole, erasingSpeed);
            } else {
                roleIndex = (roleIndex + 1) % roles.length;
                setTimeout(typeRole, typingSpeed + 500);
            }
        }

        function createVerticalLines(count) {
            for (let i = 0; i < count; i++) {
                const line = document.createElement('span');
                line.style.left = Math.random() * 100 + 'vw';
                line.style.animationDuration = (Math.random() * 3 + 3) + 's'; 
                line.style.animationDelay = Math.random() * 5 + 's';
                line.style.opacity = Math.random() * 0.8 + 0.2; 
                vLinesContainer.appendChild(line);
            }
        }

        function initParticleBackground() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            
            let particles = [];
            let width, height;

            const resize = () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2 + 1;
                    this.speedX = (Math.random() - 0.5) * 0.6;
                    this.speedY = (Math.random() - 0.5) * 0.6;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;

                    if (this.x > width) this.x = 0;
                    else if (this.x < 0) this.x = width;
                    if (this.y > height) this.y = 0;
                    else if (this.y < 0) this.y = height;
                }
                draw() {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            const createParticles = () => {
                const particleCount = Math.floor((width * height) / 12000); 
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            };
            createParticles();
            window.addEventListener('resize', createParticles);

            const connectParticles = () => {
                const maxDistance = 120;
                for (let a = 0; a < particles.length; a++) {
                    for (let b = a + 1; b < particles.length; b++) {
                        const dx = particles[a].x - particles[b].x;
                        const dy = particles[a].y - particles[b].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < maxDistance) {
                            ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 * (1 - distance / maxDistance)})`;
                            ctx.lineWidth = 0.8;
                            ctx.beginPath();
                            ctx.moveTo(particles[a].x, particles[a].y);
                            ctx.lineTo(particles[b].x, particles[b].y);
                            ctx.stroke();
                        }
                    }
                }
            };

            const animate = () => {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                connectParticles();
                requestAnimationFrame(animate);
            };
            animate();
        }

        function initCustomCursor() {
            window.addEventListener('mousemove', (e) => {
                const posX = e.clientX;
                const posY = e.clientY;
                
                cursorDot.style.left = posX + 'px';
                cursorDot.style.top = posY + 'px';
                
                cursorOutline.animate({
                    left: posX + 'px',
                    top: posY + 'px'
                }, { duration: 500, fill: "forwards" });
            });
            
            const interactables = document.querySelectorAll('a, button, .profile-img-container');
            interactables.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorOutline.style.width = '60px';
                    cursorOutline.style.height = '60px';
                    cursorOutline.style.backgroundColor = 'rgba(255, 255, 255, 0.3)';
                    cursorDot.style.width = '4px';
                    cursorDot.style.height = '4px';
                });
                el.addEventListener('mouseleave', () => {
                    cursorOutline.style.width = '40px';
                    cursorOutline.style.height = '40px';
                    cursorOutline.style.backgroundColor = 'transparent';
                    cursorDot.style.width = '10px';
                    cursorDot.style.height = '10px';
                });
            });
        }
    </script>
</body>
</html>
