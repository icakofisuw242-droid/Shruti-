<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shruti 🦋 | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        /* ORIGINAL DARK & NEON BACKGROUND */
        body { 
            background: #0f0c29; 
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29); 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
            position: relative;
        }

        /* --- ORIGINAL ANIMATED BUBBLES --- */
        .bg-bubbles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }
        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px; height: 40px;
            background-color: rgba(255, 255, 255, 0.05);
            bottom: -160px;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            animation: floatUp 25s infinite linear;
        }
        .bg-bubbles li:nth-child(1) { left: 10%; }
        .bg-bubbles li:nth-child(2) { left: 20%; width: 80px; height: 80px; animation-delay: 2s; animation-duration: 17s; }
        .bg-bubbles li:nth-child(3) { left: 25%; animation-delay: 4s; }
        /* Pink glow bubbles */
        .bg-bubbles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-duration: 22s; background-color: rgba(255, 0, 85, 0.05); box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);}
        .bg-bubbles li:nth-child(5) { left: 70%; }
        .bg-bubbles li:nth-child(6) { left: 80%; width: 120px; height: 120px; animation-delay: 3s; background-color: rgba(255, 0, 85, 0.05); box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);}
        .bg-bubbles li:nth-child(7) { left: 32%; width: 160px; height: 160px; animation-delay: 7s; }
        .bg-bubbles li:nth-child(8) { left: 55%; width: 20px; height: 20px; animation-delay: 15s; animation-duration: 40s; }
        .bg-bubbles li:nth-child(9) { left: 25%; width: 10px; height: 10px; animation-delay: 2s; animation-duration: 40s; background-color: rgba(255, 255, 255, 0.1);}
        .bg-bubbles li:nth-child(10) { left: 90%; width: 160px; height: 160px; animation-delay: 11s; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 50%; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 30%; }
        }

        /* --- ORIGINAL CARD DESIGN --- */
        .card { 
            width: 90%; max-width: 400px; 
            background: rgba(20, 20, 20, 0.6); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 25px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            z-index: 1; 
        }
        
        /* ORIGINAL PROFILE PIC (Cyan & Pink Hover) */
        .profile-pic { 
            width: 130px; height: 130px; 
            border-radius: 50%; 
            border: 3px solid #00f2fe; 
            margin-bottom: 15px; 
            transition: 0.4s; 
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); 
            object-fit: cover;
        }
        .profile-pic:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.5); 
            border-color: #ff0055;
        }
        
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 5px; color: #fff; }
        p { font-size: 14px; color: #aaa; margin-bottom: 25px; }
        
        /* ORIGINAL BUTTONS STYLE */
        .btn-container { display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            padding: 14px; border-radius: 12px; 
            text-decoration: none; color: white; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            font-size: 15px; 
            transition: 0.3s; 
        }
        .btn:hover { 
            transform: translateY(-3px); 
            border-color: #00f2fe; /* Changed hover border to cyan to match theme */
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
            color: #00f2fe;
        }
        
        /* Music indicator matching the theme */
        .music-notif {
            margin-top: 25px;
            font-size: 12px;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .music-notif i { color: #00f2fe; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

    </style>
</head>
<body>

    <!-- Animated Background Bubbles (Original style) -->
    <ul class="bg-bubbles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <!-- Main Card -->
    <div class="card">
        <!-- Shruti's Profile Pic -->
        <img src="https://files.catbox.moe/40qwsd.jpg" class="profile-pic" alt="Profile">
        
        <!-- Shruti's Name -->
        <h1>වි𖣃̵៵᎑𖾓ᛧ ࣺ</h1>
        <p>Telegram ID & Bot Hub</p>
        
        <div class="btn-container">
            <!-- Telegram ID Button -->
            <a href="https://t.me/Shruti_queeen" target="_blank" class="btn">
                <i class="fa-brands fa-telegram"></i> Telegram ID
            </a>
            
            <!-- Channel Button -->
            <a href="https://t.me/Shurti_bots" target="_blank" class="btn">
                <i class="fa-solid fa-robot"></i> Bot Channel
            </a>
        </div>
        
        <!-- Music Indicator -->
        <div class="music-notif">
            <i class="fa-solid fa-music"></i> Background music playing
        </div>
        
        <!-- Shruti's Music -->
        <audio id="bg-music" autoplay loop>
            <source src="https://files.catbox.moe/pee8cu.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- Script to enforce autoplay -->
    <script>
        window.onload = function() {
            let music = document.getElementById("bg-music");
            music.volume = 0.6;
            
            let playPromise = music.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    // Agar browser autoplay block kare
                    const startMusic = function() {
                        music.play();
                        document.body.removeEventListener('click', startMusic);
                        document.body.removeEventListener('touchstart', startMusic);
                    };

                    document.body.addEventListener('click', startMusic);
                    document.body.addEventListener('touchstart', startMusic);
                });
            }
        };
    </script>
</body>
</html>
